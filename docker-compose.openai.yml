services:
  web-app:
    environment:
      CAMPAIGN_PLANNER_PROVIDER: openai
      CAMPAIGN_PLANNER_OPENAI_ENABLED: "true"
      CAMPAIGN_PLANNER_PROMPT_VERSION: ${CAMPAIGN_PLANNER_PROMPT_VERSION:-campaign-planner-v1}
      OPENAI_MODEL: ${OPENAI_MODEL:?OPENAI_MODEL wajib diset untuk OpenAI override}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-120000}
      OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-5000}

  campaign-planner-worker:
    environment:
      CAMPAIGN_PLANNER_PROVIDER: openai
      CAMPAIGN_PLANNER_OPENAI_ENABLED: "true"
      CAMPAIGN_PLANNER_PROMPT_VERSION: ${CAMPAIGN_PLANNER_PROMPT_VERSION:-campaign-planner-v1}
      OPENAI_MODEL: ${OPENAI_MODEL:?OPENAI_MODEL wajib diset untuk OpenAI override}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-120000}
      OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-5000}
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
    secrets:
      - openai_api_key

  video-worker:
    environment:
      REAL_FOOTAGE_CONTENT_DIRECTOR_PROVIDER: openai
      REAL_FOOTAGE_INPUT_DIR: storage/footage/psd-real-footage-input
      REAL_FOOTAGE_RENDER_OUTPUT_DIR: storage/draft-videos/real-footage-mvp
      OPENAI_MODEL: ${OPENAI_MODEL:?OPENAI_MODEL wajib diset untuk OpenAI override}
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
    secrets:
      - openai_api_key

secrets:
  openai_api_key:
    file: ./secrets/openai_api_key.txt
