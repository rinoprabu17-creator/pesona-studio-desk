name: pesona-studio-desk-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pesona_studio}
      POSTGRES_USER: ${POSTGRES_USER:-pesona}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pesona_dev_password}
    ports:
      - "${POSTGRES_EXPOSED_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_EXPOSED_PORT:-6379}:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:2.26.7
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-dev_admin_password}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-dev_change_me_32_chars_minimum_key}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Jakarta}
    ports:
      - "${N8N_EXPOSED_PORT:-5678}:5678"
    volumes:
      - n8n_data_dev:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web-app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      APP_PORT: 3000
      APP_STORAGE_DIR: /app/storage
      DATABASE_URL: ${DATABASE_URL:-postgresql://pesona:pesona_dev_password@postgres:5432/pesona_studio}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PSD_ADMIN_USER: ${PSD_ADMIN_USER:?PSD_ADMIN_USER is required for web-app admin auth}
      PSD_ADMIN_PASSWORD: ${PSD_ADMIN_PASSWORD:?PSD_ADMIN_PASSWORD is required for web-app admin auth}
      OPERATIONAL_FOOTAGE_SOURCE_DIR: ${OPERATIONAL_FOOTAGE_SOURCE_DIR:-/app/storage/footage}
      CAMPAIGN_PLANNER_PROVIDER: ${CAMPAIGN_PLANNER_PROVIDER:-fake}
      CAMPAIGN_PLANNER_OPENAI_ENABLED: ${CAMPAIGN_PLANNER_OPENAI_ENABLED:-false}
      CAMPAIGN_PLANNER_PROMPT_VERSION: ${CAMPAIGN_PLANNER_PROMPT_VERSION:-campaign-planner-v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-120000}
      OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-5000}
    ports:
      - "${WEB_APP_EXPOSED_PORT:-3000}:3000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  campaign-planner-worker:
    build:
      context: .
      dockerfile: workers/campaign-planner/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://pesona:pesona_dev_password@postgres:5432/pesona_studio}
      CAMPAIGN_PLANNER_PROVIDER: ${CAMPAIGN_PLANNER_PROVIDER:-fake}
      CAMPAIGN_PLANNER_OPENAI_ENABLED: ${CAMPAIGN_PLANNER_OPENAI_ENABLED:-false}
      CAMPAIGN_PLANNER_PROMPT_VERSION: ${CAMPAIGN_PLANNER_PROMPT_VERSION:-campaign-planner-v1}
      CAMPAIGN_PLANNER_FAKE_MODE: ${CAMPAIGN_PLANNER_FAKE_MODE:-valid}
      CAMPAIGN_PLANNER_POLL_MS: ${CAMPAIGN_PLANNER_POLL_MS:-2000}
      CAMPAIGN_PLANNER_LEASE_SECONDS: ${CAMPAIGN_PLANNER_LEASE_SECONDS:-60}
      CAMPAIGN_PLANNER_MAX_ATTEMPTS: ${CAMPAIGN_PLANNER_MAX_ATTEMPTS:-3}
      CAMPAIGN_PLANNER_BATCH_SIZE: ${CAMPAIGN_PLANNER_BATCH_SIZE:-5}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-120000}
      OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-5000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  video-worker:
    build:
      context: .
      dockerfile: workers/video/Dockerfile
    environment:
      APP_STORAGE_DIR: /app/storage
      DATABASE_URL: ${DATABASE_URL:-postgresql://pesona:pesona_dev_password@postgres:5432/pesona_studio}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      OPERATIONAL_FOOTAGE_SOURCE_DIR: ${OPERATIONAL_FOOTAGE_SOURCE_DIR:-/app/storage/footage}
      VIDEO_WORKER_POLL_INTERVAL_MS: ${VIDEO_WORKER_POLL_INTERVAL_MS:-15000}
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mockup-worker:
    build:
      context: .
      dockerfile: workers/mockup/Dockerfile
    environment:
      APP_STORAGE_DIR: /app/storage
      DATABASE_URL: ${DATABASE_URL:-postgresql://pesona:pesona_dev_password@postgres:5432/pesona_studio}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MOCKUP_WORKER_POLL_INTERVAL_MS: ${MOCKUP_WORKER_POLL_INTERVAL_MS:-15000}
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data_dev:
  redis_data_dev:
  n8n_data_dev:
